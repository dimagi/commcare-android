name: commcare-android PR CI

on:
  pull_request:
  workflow_dispatch:
    inputs:
      commcare_core_sha:
        description: 'commcare-core SHA to test against'
        required: false
      commcare_core_pr:
        description: 'commcare-core PR number for status reporting'
        required: false
      commcare_core_check_name:
        description: 'Status check name to report back to commcare-core'
        required: false
      commcare_core_status_sha:
        description: 'commcare-core PR head SHA for status reporting'
        required: false
concurrency:
  group: ${{ github.workflow }}-${{ inputs.commcare_core_sha || github.ref }}
  cancel-in-progress: true
jobs:
  build-test-assemble:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout commcare-android
        uses: actions/checkout@v6
        with:
          path: commcare-android
      - name: Install python
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/setup-python@v6
        with:
          python-version: '3.9'
      - name: Download cross request script
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          curl https://raw.githubusercontent.com/dimagi/mobile-deploy/master/requirements.txt -o requirements.txt
          curl https://raw.githubusercontent.com/dimagi/mobile-deploy/master/checkout_cross_request_repo.py -o checkout_cross_request_repo.py
      - name: Install Python dependencies
        if: ${{ github.event_name == 'pull_request' }}
        run: python -m pip install -r requirements.txt
      - name: Run cross request script
        if: ${{ github.event_name == 'pull_request' }}
        run: python checkout_cross_request_repo.py commcare-android ${{ github.event.number }} commcare-core
      - name: Checkout commcare-core for cross-repo CI
        if: ${{ inputs.commcare_core_sha }}
        uses: actions/checkout@v6
        with:
          repository: dimagi/commcare-core
          ref: ${{ inputs.commcare_core_sha }}
          path: commcare-core
      - name: Generate GitHub App token
        if: ${{ always() && inputs.commcare_core_check_name && inputs.commcare_core_sha }}
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CROSS_REPO_CI_APP_ID }}
          private-key: ${{ secrets.CROSS_REPO_CI_PRIVATE_KEY }}
          owner: dimagi
          repositories: commcare-core
      - name: Generate Gradle properties
        run: |
          mkdir -p ~/.gradle
          cat > ~/.gradle/gradle.properties <<'EOF'
          org.gradle.jvmargs=-Xmx3g -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
          org.gradle.parallel=false
          TEST_BUILD_TYPE=release
          RELEASE_STORE_FILE=/home/runner/.gradle/commcare-odk-keys.keystore
          RELEASE_STORE_PASSWORD=${{ secrets.KEY_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS=${{ secrets.ALIAS }}
          RELEASE_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}
          GOOGLE_CLOUD_PROJECT_NUMBER=${{ secrets.GOOGLE_CLOUD_PROJECT_NUMBER }}
          GOOGLE_SERVICES_API_KEY=${{ secrets.GOOGLE_SERVICES_API_KEY }}
          FIREBASE_DATABASE_URL=${{ secrets.FIREBASE_DATABASE_URL }}
          GOOGLE_PLAY_MAPS_API_KEY=${{ secrets.GOOGLE_PLAY_MAPS_API_KEY }}
          HQ_API_USERNAME=${{ secrets.HQ_API_USERNAME }}
          HQ_API_PASSWORD=${{ secrets.HQ_API_PASSWORD }}
          MAPBOX_SDK_API_KEY=${{ secrets.MAPBOX_SDK_API_KEY }}
          versionCode=${{ github.run_number }}
          EOF
      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Run Tests
        run: ./gradlew testCommcareDebug
        working-directory: commcare-android
      - name: Restore Keystore
        run: echo "$SIGNING_KEY" | base64 -d > ~/.gradle/commcare-odk-keys.keystore
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
      - name: Assemble CommCare release APK
        run: ./gradlew assembleCommcareRelease
        working-directory: commcare-android
      - name: Upload CommCare release APK
        uses: actions/upload-artifact@v6
        with:
          name: commcare-release-apk
          path: commcare-android/app/build/outputs/apk/commcare/release/app-commcare-release.apk
      - name: Bundle CommCare release AAB
        run: ./gradlew bundleCommcareRelease
        working-directory: commcare-android
      - name: Upload CommCare release AAB
        uses: actions/upload-artifact@v6
        with:
          name: commcare-release-aab
          path: commcare-android/app/build/outputs/bundle/commcareRelease/app-commcare-release.aab
      - name: Assemble CCC Staging release APK
        run: ./gradlew assembleCccStagingRelease
        working-directory: commcare-android
      - name: Upload CCC Staging release APK
        uses: actions/upload-artifact@v6
        with:
          name: ccc-staging-release-apk
          path: commcare-android/app/build/outputs/apk/cccStaging/release/app-cccStaging-release.apk
      - name: Assemble CommCare qaAutomation apk
        if: github.event_name == 'workflow_dispatch'
        run: ./gradlew assembleCommcareQaAutomation
        working-directory: commcare-android
      - name: Upload CommCare qaAutomation apk
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v6
        with:
          name: commcare-qaAutomation-release-apk
          path: commcare-android/app/build/outputs/apk/commcare/qaAutomation/app-commcare-qaAutomation.apk
          retention-days: 3
      - name: Assemble CCC Staging qaAutomation apk
        if: github.event_name == 'workflow_dispatch'
        run: ./gradlew assembleCccStagingQaAutomation
        working-directory: commcare-android
      - name: Upload CCC Staging qaAutomation apk
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v6
        with:
          name: ccc-staging-qaAutomation-release-apk
          path: commcare-android/app/build/outputs/apk/cccStaging/qaAutomation/app-cccStaging-qaAutomation.apk
          retention-days: 3
      - name: Assemble CommCare apk for Instrumentation Testing
        run: ./gradlew assembleCommcareReleaseAndroidTest
        working-directory: commcare-android
      - name: Encrypt CommCare androidTest apk
        run: |
          openssl enc -aes-256-cbc -salt -pbkdf2 \
            -in commcare-android/app/build/outputs/apk/androidTest/commcare/release/app-commcare-release-androidTest.apk \
            -out commcare-android/app/build/outputs/apk/androidTest/commcare/release/app-commcare-release-androidTest.apk.enc \
            -pass pass:"$HQ_API_PASSWORD"
        env:
          HQ_API_PASSWORD: ${{ secrets.HQ_API_PASSWORD }}
      - name: Upload CommCare apk for Instrumentation Testing
        uses: actions/upload-artifact@v6
        with:
          name: commcare-release-androidTest-apk
          path: commcare-android/app/build/outputs/apk/androidTest/commcare/release/app-commcare-release-androidTest.apk.enc
      - name: Generate JaCoCo Report
        run: ./gradlew JacocoTestReport
        working-directory: commcare-android
      - name: Upload JaCoCo Report
        uses: actions/upload-artifact@v6
        with:
          name: jacoco-report
          path: commcare-android/app/build/reports
      - name: Report status to commcare-core
        if: ${{ always() && inputs.commcare_core_check_name && inputs.commcare_core_sha }}
        uses: actions/github-script@v7
        env:
          COMMCARE_CORE_STATUS_SHA: ${{ inputs.commcare_core_status_sha || inputs.commcare_core_sha }}
          COMMCARE_CORE_CHECK_NAME: ${{ inputs.commcare_core_check_name }}
          JOB_STATUS: ${{ job.status }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const state = process.env.JOB_STATUS === 'success' ? 'success' : 'failure';
            const description = state === 'success' ? 'Tests passed' : 'Tests failed';
            await github.rest.repos.createCommitStatus({
              owner: 'dimagi',
              repo: 'commcare-core',
              sha: process.env.COMMCARE_CORE_STATUS_SHA,
              state,
              context: process.env.COMMCARE_CORE_CHECK_NAME,
              description,
              target_url: `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`
            });

  browserstack-tests:
    if: ${{ github.event_name == 'pull_request' }}
    needs: build-test-assemble
    uses: ./.github/workflows/browserstack-tests.yml
    with:
      pr-number: '${{ github.event.number }}'
    secrets:
      HQ_API_PASSWORD: ${{ secrets.HQ_API_PASSWORD }}
      BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
      BROWSERSTACK_PASSWORD: ${{ secrets.BROWSERSTACK_PASSWORD }}
