name: BrowserStack Tests

on:
  workflow_call:
    inputs:
      pr-number:
        description: 'PR number (optional, for PR workflows)'
        required: false
        type: string
        default: ''
    secrets:
      HQ_API_PASSWORD:
        required: true
      BROWSERSTACK_USERNAME:
        required: true
      BROWSERSTACK_PASSWORD:
        required: true

jobs:
  browserstack-tests:
    name: BrowserStack Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout commcare-android
        uses: actions/checkout@v6
        with:
          path: commcare-android
      - name: Install python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Download release APK
        uses: actions/download-artifact@v6
        with:
          name: commcare-release-apk
          path: commcare-release-apk
      - name: Download androidTest APK
        uses: actions/download-artifact@v6
        with:
          name: commcare-release-androidTest-apk
          path: commcare-release-androidTest-apk
      - name: Decrypt CommCare androidTest apk
        run: |
          openssl enc -aes-256-cbc -d -pbkdf2 \
            -in commcare-release-androidTest-apk/app-commcare-release-androidTest.apk.enc \
            -out commcare-release-androidTest-apk/app-commcare-release-androidTest.apk \
            -pass pass:"$HQ_API_PASSWORD"
        env:
          HQ_API_PASSWORD: ${{ secrets.HQ_API_PASSWORD }}
      - name: Run BrowserStack Instrumentation Tests
        run: python commcare-android/scripts/browserstack.py
        env:
          BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_PASSWORD: ${{ secrets.BROWSERSTACK_PASSWORD }}
          RELEASE_APP_LOCATION: commcare-release-apk/app-commcare-release.apk
          TEST_APP_LOCATION: commcare-release-androidTest-apk/app-commcare-release-androidTest.apk
          BROWSERSTACK_DEVICES: "Samsung Galaxy S10-9.0"
          PR_NUMBER: ${{ inputs.pr-number }}
