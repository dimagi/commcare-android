name: CommCare Android Release Build

on:
  push:
    tags:
      - 'commcare_*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (X.Y.Z)'
        required: true
        type: string

concurrency:
  group: release-build-${{ github.ref }}
  cancel-in-progress: false

env:
  CCCORE: commcare-core
  USERNAME: buildserver
  REMOTE_HOST: "https://www.commcarehq.org+https://india.commcarehq.org"

jobs:
  build:
    name: Release Build
    runs-on: ubuntu-latest
    steps:
      - name: Parse version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/commcare_}
          fi
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: version must be in format X.Y.Z, got $VERSION"
            exit 1
          fi
          MAJOR_MINOR=${VERSION%.*}
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "CCCORE_BRANCH=commcare_$MAJOR_MINOR" >> "$GITHUB_ENV"
      - name: Checkout commcare-android
        uses: actions/checkout@v6
        with:
          path: commcare-android
      - name: Install python
        uses: actions/setup-python@v6
        with:
          python-version: '3.9'
      - name: Checkout commcare-core
        uses: actions/checkout@v6
        with:
          repository: dimagi/commcare-core
          ref: ${{ env.CCCORE_BRANCH }}
          path: commcare-core
          fetch-depth: 0
      - name: Generate Gradle properties
        run: |
          mkdir -p ~/.gradle
          cat > ~/.gradle/gradle.properties <<'EOF'
          org.gradle.jvmargs=-Xmx3g -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
          org.gradle.parallel=false
          TEST_BUILD_TYPE=release
          RELEASE_STORE_FILE=/home/runner/.gradle/commcare-odk-keys.keystore
          RELEASE_STORE_PASSWORD=${{ secrets.KEY_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS=${{ secrets.ALIAS }}
          RELEASE_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}
          GOOGLE_CLOUD_PROJECT_NUMBER=${{ secrets.GOOGLE_CLOUD_PROJECT_NUMBER }}
          GOOGLE_SERVICES_API_KEY=${{ secrets.GOOGLE_SERVICES_API_KEY }}
          FIREBASE_DATABASE_URL=${{ secrets.FIREBASE_DATABASE_URL }}
          GOOGLE_PLAY_MAPS_API_KEY=${{ secrets.GOOGLE_PLAY_MAPS_API_KEY }}
          HQ_API_USERNAME=${{ secrets.HQ_API_USERNAME }}
          HQ_API_PASSWORD=${{ secrets.HQ_API_PASSWORD }}
          MAPBOX_SDK_API_KEY=${{ secrets.MAPBOX_SDK_API_KEY }}
          EOF
      - name: Add release-specific gradle properties
        run: |
          cat >> ~/.gradle/gradle.properties <<'EOF'
          versionCode=${{ github.run_number }}
          EOF
      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Run Tests
        run: ./gradlew testCommcareDebug -Dorg.gradle.daemon=false -Dorg.gradle.parallel=false --no-daemon --max-workers 1
        working-directory: commcare-android
      - name: Restore Keystore
        run: echo "$SIGNING_KEY" | base64 -d > ~/.gradle/commcare-odk-keys.keystore
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
      - name: Bundle and assemble release variants
        working-directory: commcare-android
        run: |
          ./gradlew \
            bundleCommcareRelease \
            assembleCommcareRelease \
            assembleCccStagingRelease \
            bundleLtsRelease \
            -Dorg.gradle.daemon=false \
            -Dorg.gradle.parallel=false \
            --no-daemon \
            --max-workers 1
      - name: Submit build
        working-directory: commcare-android
        env:
          PASSWORD: ${{ secrets.BUILD_SERVER_PASSWORD }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: python scripts/submit_build.py
      - name: Upload CommCare release APK
        uses: actions/upload-artifact@v6
        with:
          name: commcare-release-apk
          path: commcare-android/app/build/outputs/apk/commcare/release/app-commcare-release.apk
      - name: Upload CommCare release AAB
        uses: actions/upload-artifact@v6
        with:
          name: commcare-release-aab
          path: commcare-android/app/build/outputs/bundle/commcareRelease/app-commcare-release.aab
      - name: Upload CCC Staging release APK
        uses: actions/upload-artifact@v6
        with:
          name: ccc-staging-release-apk
          path: commcare-android/app/build/outputs/apk/cccStaging/release/app-cccStaging-release.apk
      - name: Upload LTS release APK
        uses: actions/upload-artifact@v6
        with:
          name: app-lts-release-apk
          path: commcare-android/app/build/outputs/apk/lts/release/app-lts-release.apk
      - name: Upload LTS release AAB
        uses: actions/upload-artifact@v6
        with:
          name: app-lts-release-aab
          path: commcare-android/app/build/outputs/bundle/ltsRelease/app-lts-release.aab
      - name: Prepare release assets
        run: |
          cp commcare-android/app/build/outputs/apk/commcare/release/app-commcare-release.apk "commcare_${VERSION}.apk"
          cp commcare-android/app/build/outputs/bundle/commcareRelease/app-commcare-release.aab "commcare_${VERSION}.aab"
      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "commcare_${VERSION}" \
            --repo "$GITHUB_REPOSITORY" \
            --title "CommCare ${VERSION}" \
            --draft \
            "commcare_${VERSION}.apk" \
            "commcare_${VERSION}.aab"
