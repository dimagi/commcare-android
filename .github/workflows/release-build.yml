name: CommCare Android Release Build

on:
  push:
    tags:
      - 'commcare_*'

concurrency:
  group: release-build-${{ github.ref }}
  cancel-in-progress: false

env:
  CCCORE: commcare-core
  USERNAME: buildserver
  REMOTE_HOST: "https://www.commcarehq.org+https://india.commcarehq.org"

jobs:
  build:
    name: Release Build
    runs-on: ubuntu-latest
    steps:
      - name: Parse version from tag
        run: |
          TAG=${GITHUB_REF#refs/tags/commcare_}
          if [[ ! "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: tag must be in format commcare_X.Y.Z, got commcare_$TAG"
            exit 1
          fi
          MAJOR_MINOR=${TAG%.*}
          echo "VERSION=$TAG" >> "$GITHUB_ENV"
          echo "CCCORE_BRANCH=commcare_$MAJOR_MINOR" >> "$GITHUB_ENV"
      - name: Checkout commcare-android
        uses: actions/checkout@v4
        with:
          path: commcare-android

      - name: Checkout commcare-core
        uses: actions/checkout@v4
        with:
          repository: dimagi/commcare-core
          ref: ${{ env.CCCORE_BRANCH }}
          path: commcare-core
          fetch-depth: 0

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run tests
        working-directory: commcare-android
        run: ./gradlew testCommcareDebug -Dorg.gradle.daemon=false -Dorg.gradle.parallel=false --no-daemon --max-workers 1

      - name: Bundle and assemble release variants
        working-directory: commcare-android
        run: |
          ./gradlew \
            -PversionCode=${{ github.run_number }} \
            bundleCommcareRelease \
            assembleCommcareRelease \
            assembleCccStagingRelease \
            bundleLtsRelease \
            assembleCommcareReleaseAndroidTest \
            -Dorg.gradle.daemon=false \
            -Dorg.gradle.parallel=false \
            --no-daemon \
            --max-workers 1

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Submit build
        working-directory: commcare-android
        env:
          PASSWORD: ${{ secrets.BUILD_SERVER_PASSWORD }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: python scripts/submit_build.py

      - name: Upload CommCare release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-commcare-release-apk
          path: commcare-android/app/build/outputs/apk/commcare/release/app-commcare-release.apk

      - name: Upload CommCare release AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-commcare-release-aab
          path: commcare-android/app/build/outputs/bundle/commcareRelease/app-commcare-release.aab

      - name: Upload LTS release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-lts-release-apk
          path: commcare-android/app/build/outputs/apk/lts/release/app-lts-release.apk

      - name: Upload LTS release AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-lts-release-aab
          path: commcare-android/app/build/outputs/bundle/ltsRelease/app-lts-release.aab

      - name: Upload CCC Staging release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-cccStaging-release-apk
          path: commcare-android/app/build/outputs/apk/cccStaging/release/app-cccStaging-release.apk

      - name: Encrypt Android test APK
        env:
          HQ_API_PASSWORD: ${{ secrets.HQ_API_PASSWORD }}
        run: gpg --batch --yes --passphrase "$HQ_API_PASSWORD" --symmetric --cipher-algo AES256 -o commcare-android/app/build/outputs/apk/androidTest/commcare/release/app-commcare-release-androidTest.apk.gpg commcare-android/app/build/outputs/apk/androidTest/commcare/release/app-commcare-release-androidTest.apk

      - name: Upload Android test APK
        uses: actions/upload-artifact@v4
        with:
          name: app-commcare-release-androidTest-apk
          path: commcare-android/app/build/outputs/apk/androidTest/commcare/release/app-commcare-release-androidTest.apk.gpg

      - name: Prepare release assets
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#commcare_}
          cp commcare-android/app/build/outputs/apk/commcare/release/app-commcare-release.apk "commcare_${VERSION}.apk"
          cp commcare-android/app/build/outputs/bundle/commcareRelease/app-commcare-release.aab "commcare_${VERSION}.aab"

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#commcare_}
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "CommCare ${VERSION}" \
            --draft \
            "commcare_${VERSION}.apk" \
            "commcare_${VERSION}.aab"
